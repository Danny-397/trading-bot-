# Render deployment configuration
# Docs: https://render.com/docs/render-yaml-spec
#
# Deploy with one click: https://render.com/deploy
# Or push this file to GitHub and Render will detect it automatically.

services:
  - type: web
    name: tradebot-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    # gunicorn.conf.py is auto-discovered — sets workers=1, timeout=120,
    # threads=4, and binds to $PORT.

    # No brokerage API keys needed — the bot uses an internal paper-trading
    # simulator that fills orders at real yfinance prices.
    #
    # No persistent disk: the SQLite DB lives on the ephemeral filesystem and
    # resets on each deploy. To keep trade history across deploys, add a disk
    # mounted at /data and set DATABASE_PATH=/data/tradebot.db (requires a
    # paid Render plan — disks are not available on the free tier).
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"            # pandas/numpy/scipy ship wheels for 3.11;
                                   # newer Pythons force a slow source build that fails

      - key: CORS_ORIGINS
        sync: false          # set to your Vercel URL after frontend deploy
                             # e.g. https://your-project.vercel.app

    healthCheckPath: /health
